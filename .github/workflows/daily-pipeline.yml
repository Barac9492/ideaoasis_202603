name: Daily Pipeline

on:
  schedule:
    - cron: "0 20 * * *" # 5:00 AM KST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run daily pipeline
        run: npm run generate
        env:
          PH_API_TOKEN: ${{ secrets.PH_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Generate RSS feed
        run: npm run generate:rss

      - name: Commit and push
        run: |
          git config user.name "IdeaOasis Bot"
          git config user.email "bot@ideaoasis.kr"
          git add data/ public/feed.xml public/og/
          git diff --staged --quiet || git commit -m "feat: daily digest $(date +%Y-%m-%d)"
          git push

      - name: Send category alerts
        run: npm run send-alerts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
